name: CI Pipeline - POC Antigravity

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:

  unit-tests:
    name: Unit Tests (pytest + coverage 80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov pytest-mock httpx
      - name: Run pytest with coverage (fail under 80%)
        run: |
          PYTHONPATH=. pytest tests/ \
            --junitxml=junit.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --cov-fail-under=80 \
            -v
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml
      - name: Summary
        if: always()
        run: |
          echo "## Unit Tests Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f junit.xml ]; then
            tests=$(grep -oP 'tests="[0-9]+"' junit.xml | head -1 | grep -oP '[0-9]+' || echo "?")
            failures=$(grep -oP 'failures="[0-9]+"' junit.xml | head -1 | grep -oP '[0-9]+' || echo "?")
            errors=$(grep -oP 'errors="[0-9]+"' junit.xml | head -1 | grep -oP '[0-9]+' || echo "?")
            echo "- Total tests: $tests" >> $GITHUB_STEP_SUMMARY
            echo "- Failures: $failures" >> $GITHUB_STEP_SUMMARY
            echo "- Errors: $errors" >> $GITHUB_STEP_SUMMARY
          fi

  security-scan:
    name: Security Scan (Bandit + Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install bandit safety
      - name: SAST Bandit (fail on HIGH)
        run: bandit -r src/ --severity-level high -f txt
      - name: SCA Safety (fail on known CVE)
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt
          fi

  quality-gate:
    name: Quality Gate (SonarCloud)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  iac-scan:
    name: IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Checkov
        run: pip install checkov
      - name: Checkov Scan (Dockerfile + GitHub Actions)
        run: |
          echo "## Scanning Dockerfile"
          if [ -f Dockerfile ]; then
            checkov -f Dockerfile --framework dockerfile --compact --quiet
          fi
          echo "## Scanning GitHub Actions workflows"
          if [ -d .github/workflows ]; then
            checkov -d .github/workflows --framework github_actions --compact --quiet
          fi

  trivy-scan:
    name: Trivy Image Scan (CRITICAL/HIGH blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t poc-oauth:ci-${{ github.sha }} .
      - name: Run Trivy vulnerability scanner (blocking)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0 - pinned to SHA (supply chain protection)
        with:
          image-ref: "poc-oauth:ci-${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
      - name: Run Trivy (generate SARIF for artifact)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0 - pinned to SHA
        with:
          image-ref: "poc-oauth:ci-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  notify-grafana:
    name: Notify Grafana
    runs-on: ubuntu-latest
    needs: [unit-tests, security-scan, quality-gate, iac-scan, trivy-scan]
    if: always()
    steps:
      - name: Send log to Grafana Loki
        run: |
          STATUS="success"
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.security-scan.result }}" != "success" ] || \
             [ "${{ needs.quality-gate.result }}" != "success" ] || \
             [ "${{ needs.iac-scan.result }}" != "success" ] || \
             [ "${{ needs.trivy-scan.result }}" != "success" ]; then
            STATUS="failure"
          fi
          curl -s -X POST "${{ secrets.GRAFANA_LOKI_URL }}/loki/api/v1/push" \
            -u "${{ secrets.GRAFANA_USER }}:${{ secrets.GRAFANA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"streams\":[{\"stream\":{\"service\":\"poc-antigravity\",\"agent\":\"ci-pipeline\",\"level\":\"INFO\"},\"values\":[[\"$(date +%s%N)\",\"{\\\"status\\\":\\\"$STATUS\\\",\\\"branch\\\":\\\"${{ github.ref_name }}\\\"}\"]]}]}"